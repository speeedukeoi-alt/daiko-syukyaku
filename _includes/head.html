<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} | {% endif %}運転代行の集客屋</title>
  <meta name="description" content="{% if page.description %}{{ page.description }}{% else %}地方運転代行向け集客改善支援。待機依存から検索で呼ばれる代行へ。{% endif %}">
  <link rel="canonical" href="{{ page.url | prepend: site.url }}">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700;900&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
  {% if page.layout == 'post' %}
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "BlogPosting",
    "headline": "{{ page.title }}",
    "datePublished": "{{ page.date | date_to_xmlschema }}",
    "author": {
      "@type": "Person",
      "name": "ヤマモト"
    }
  }
  </script>
  {% endif %}
</head>
<body>
<header class="header">
  <a href="{{ '/' | relative_url }}" class="logo">運転代行の集客屋</a>
  <nav class="nav">
    <a href="{{ '/blog/' | relative_url }}">ブログ</a>
    <a href="{{ '/profile/' | relative_url }}">代表について</a>
    <a href="{{ '/#pricing' | relative_url }}">料金</a>
    <a href="{{ '/contact/' | relative_url }}" class="nav-cta">無料診断</a>
  </nav>
</header>
